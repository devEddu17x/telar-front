name: CD

on:
  push:
    branches:
      - develop
      - qa
      - prod
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  resolve-environment:
    name: Resolve environment
    runs-on: ubuntu-latest

    outputs:
      environment: ${{ steps.resolve.outputs.environment }}

    steps:
      - name: Resolve target
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENVIRONMENT="${{ inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            ENVIRONMENT="dev"
          elif [ "${{ github.ref }}" = "refs/heads/qa" ]; then
            ENVIRONMENT="qa"
          elif [ "${{ github.ref }}" = "refs/heads/prod" ]; then
            ENVIRONMENT="prod"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENVIRONMENT="prod"
          else
            echo "Unsupported ref: ${{ github.ref }}"
            exit 1
          fi

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: resolve-environment
    environment: ${{ needs.resolve-environment.outputs.environment }}

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      SSM_PREFIX: ${{ vars.SSM_PREFIX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment variables
        shell: bash
        run: |
          missing=0

          for name in AWS_REGION AWS_ROLE_ARN SSM_PREFIX; do
            if [ -z "${!name}" ]; then
              echo "$name is not configured for the '${{ needs.resolve-environment.outputs.environment }}' environment"
              missing=1
            fi
          done

          exit "$missing"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read frontend parameters
        shell: bash
        run: |
          PARAMETERS_JSON="$(aws ssm get-parameters \
            --names \
              "${SSM_PREFIX}/NEXT_PUBLIC_API_URL" \
              "${SSM_PREFIX}/NEXT_PUBLIC_AWS_COGNITO_REGION" \
              "${SSM_PREFIX}/NEXT_PUBLIC_AWS_COGNITO_CLIENT_ID" \
              "${SSM_PREFIX}/ASSETS_HOSTNAME" \
              "${SSM_PREFIX}/FRONTEND_BUCKET_NAME" \
              "${SSM_PREFIX}/FRONTEND_DISTRIBUTION_ID" \
            --query "Parameters[].{Name:Name,Value:Value}" \
            --output json)"

          get_parameter() {
            echo "$PARAMETERS_JSON" | jq -r --arg name "${SSM_PREFIX}/$1" '.[] | select(.Name == $name) | .Value'
          }

          echo "NEXT_PUBLIC_API_URL=$(get_parameter NEXT_PUBLIC_API_URL)" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_AWS_COGNITO_REGION=$(get_parameter NEXT_PUBLIC_AWS_COGNITO_REGION)" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_AWS_COGNITO_CLIENT_ID=$(get_parameter NEXT_PUBLIC_AWS_COGNITO_CLIENT_ID)" >> "$GITHUB_ENV"
          echo "ASSETS_HOSTNAME=$(get_parameter ASSETS_HOSTNAME)" >> "$GITHUB_ENV"
          echo "FRONTEND_BUCKET_NAME=$(get_parameter FRONTEND_BUCKET_NAME)" >> "$GITHUB_ENV"
          echo "FRONTEND_DISTRIBUTION_ID=$(get_parameter FRONTEND_DISTRIBUTION_ID)" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload static export
        run: aws s3 sync out/ "s3://${FRONTEND_BUCKET_NAME}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${FRONTEND_DISTRIBUTION_ID}" \
            --paths "/*"
